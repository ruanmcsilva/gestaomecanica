version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=gestao_mecanica
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin

  backend:
    build: ./gestaoMeacnicaBeck-main
    volumes:
      - ./gestaoMeacnicaBeck-main:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./gestaoMecanicaFront-main
    volumes:
      - ./gestaoMecanicaFront-main:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data: